name: Deploy Caepy Plus Frontend to S3 (Dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Build and Deploy to S3
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build static export
      env:
        NEXT_PUBLIC_BASE_PATH: ${{ secrets.NEXT_PUBLIC_BASE_PATH || '/portal/caepy' }}
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://dev1.linqmd.com/caepy/api/v1' }}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Sync to S3
      run: |
        S3_BUCKET="${{ secrets.PORTALS_S3_BUCKET }}"
        if [ -z "$S3_BUCKET" ]; then
          echo "::error::PORTALS_S3_BUCKET secret is not set. Run Terraform apply with enable_portals_cloudfront=true and sync GitHub secrets."
          exit 1
        fi
        echo "Syncing out/ to s3://$S3_BUCKET/"
        aws s3 sync out/ s3://$S3_BUCKET/ \
          --delete \
          --cache-control "public, max-age=31536000, immutable" \
          --exclude "*.html" \
          --exclude "*.json"
        aws s3 sync out/ s3://$S3_BUCKET/ \
          --delete \
          --cache-control "public, max-age=0, must-revalidate" \
          --exclude "*" \
          --include "*.html" \
          --include "*.json"

    - name: Invalidate CloudFront
      run: |
        DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        PREFIX="${{ secrets.CAEPY_PORTAL_S3_PREFIX || 'portal/caepy' }}"
        if [ -n "$DIST_ID" ] && [ -n "$PREFIX" ]; then
          echo "Invalidating CloudFront cache for /$PREFIX/*"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/$PREFIX/*"
        fi
