server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite fingerprints filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /api/* to the backend service.
    # At runtime, set the BACKEND_HOST env var or override this directly.
    # In ECS: use the backend service's internal DNS name or ALB URL.
    # In Kubernetes: use the backend ClusterIP service name.
    location /api/ {
        proxy_pass        http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Healthcheck endpoint (used by ECS / k8s liveness & readiness probes)
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — send all non-file routes to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
